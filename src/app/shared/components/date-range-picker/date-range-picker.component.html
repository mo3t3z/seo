<div class="date-range-picker">
  <mat-button-toggle-group 
    [value]="selectedPreset" 
    (change)="onPresetChange($event.value)"
    aria-label="Select date range">
    <mat-button-toggle value="7d" aria-label="Last 7 days">7d</mat-button-toggle>
    <mat-button-toggle value="30d" aria-label="Last 30 days">30d</mat-button-toggle>
    <mat-button-toggle value="90d" aria-label="Last 90 days">90d</mat-button-toggle>
    <mat-button-toggle value="custom" aria-label="Custom date range">Custom</mat-button-toggle>
  </mat-button-toggle-group>

  @if (showCustomPicker) {
    <div class="custom-range">
      <mat-form-field appearance="outline">
        <mat-label>Start</mat-label>
        <input 
          matInput 
          [matDatepicker]="startPicker" 
          [(ngModel)]="customStart"
          (dateChange)="onCustomRangeChange()"
          aria-label="Start date">
        <mat-datepicker-toggle matIconSuffix [for]="startPicker"></mat-datepicker-toggle>
        <mat-datepicker #startPicker></mat-datepicker>
      </mat-form-field>
      
      <mat-form-field appearance="outline">
        <mat-label>End</mat-label>
        <input 
          matInput 
          [matDatepicker]="endPicker" 
          [(ngModel)]="customEnd"
          (dateChange)="onCustomRangeChange()"
          aria-label="End date">
        <mat-datepicker-toggle matIconSuffix [for]="endPicker"></mat-datepicker-toggle>
        <mat-datepicker #endPicker></mat-datepicker>
      </mat-form-field>
    </div>
  }
</div>
