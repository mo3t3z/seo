<div class="pages-container">
  <app-page-header 
    title="Pages" 
    subtitle="Analyze page performance and SEO health">
  </app-page-header>

  <div class="filters-section">
    <app-date-range-picker (rangeChange)="onDateRangeChange($event)"></app-date-range-picker>
  </div>

  <mat-card>
    <mat-card-content>
      @if (isLoading) {
        <app-loading-state message="Loading pages..."></app-loading-state>
      } @else if (pages.length === 0) {
        <app-empty-state 
          icon="article" 
          title="No pages found" 
          message="No page data available for the selected period.">
        </app-empty-state>
      } @else {
        <div class="table-responsive">
          <table mat-table [dataSource]="sortedPages" matSort (matSortChange)="sortData($event)">
            <ng-container matColumnDef="page">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Page</th>
              <td mat-cell *matCellDef="let row">
                <div class="page-cell">
                  <span class="page-url">{{ row.page }}</span>
                  @if (hasIssue(row.seoScore)) {
                    <mat-icon 
                      class="issue-icon" 
                      [matTooltip]="getIssueTooltip(row.seoScore)"
                      matTooltipPosition="right"
                      aria-label="SEO issue detected">
                      warning
                    </mat-icon>
                  }
                </div>
              </td>
            </ng-container>

            <ng-container matColumnDef="sessions">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Sessions</th>
              <td mat-cell *matCellDef="let row">{{ row.sessions | number }}</td>
            </ng-container>

            <ng-container matColumnDef="bounceRate">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Bounce Rate</th>
              <td mat-cell *matCellDef="let row">{{ row.bounceRate | number:'1.1-1' }}%</td>
            </ng-container>

            <ng-container matColumnDef="avgTime">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Avg Time</th>
              <td mat-cell *matCellDef="let row">{{ row.avgTime }}</td>
            </ng-container>

            <ng-container matColumnDef="seoScore">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>SEO Score</th>
              <td mat-cell *matCellDef="let row">
                <mat-chip [class]="getScoreColor(row.seoScore)">
                  {{ row.seoScore }}
                </mat-chip>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
        </div>
      }
    </mat-card-content>
  </mat-card>
</div>
